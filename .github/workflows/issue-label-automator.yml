name: Issue Label Automator

on:
  issues:
    types: [opened, edited]

concurrency:
  group: issue-label-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  add-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse issue form and sync labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            const MOD_LABELS = new Map([
              ['AE2', 'Mod: AE2'],
              ['GTM', 'Mod: GTM'],
              ['GTOCore', 'Mod: GTOCore']
            ]);

            // Keep a robust fallback in case repository labels are not initialized.
            const PRIORITY_LABEL_FALLBACK = '重要 major';

            const { data: latestIssue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });

            const currentLabels = new Set(latestIssue.labels.map(l => l.name));
            const finalLabels = new Set(currentLabels);

            // Mod 匹配 (opened, edited)
            const modSectionMatch = body.match(
              /###\s*Related Mod \(Optional\)\s*\/[^\n]*\n+([\s\S]*?)(?:\n###\s|$)/i
            );
            if (modSectionMatch) {
              const modSection = modSectionMatch[1];
              const checkedOptions = new Set(
                (modSection.match(/^- \[[xX]\]\s*(.+?)\s*$/gm) || [])
                  .map(line => line.replace(/^- \[[xX]\]\s*/, '').trim())
              );

              for (const [option, label] of MOD_LABELS.entries()) {
                if (checkedOptions.has(option)) {
                  finalLabels.add(label);
                } else {
                  finalLabels.delete(label);
                }
              }
            }

            // Priority 匹配 (opened)
            if (context.payload.action === 'opened') {
              // Match "### Priority / ...", then read the selected value from next non-empty line.
              const priorityMatch = body.match(/###\s*Priority\s*\/[^\n]*\n+\s*([^\n]+)/i);
              if (priorityMatch) {
                const priorityValue = priorityMatch[1].trim();
                const isPriorityMajor = /^Major\b/i.test(priorityValue);
                if (isPriorityMajor) {
                  finalLabels.add(PRIORITY_LABEL_FALLBACK);
                }
              }
            }

            const currentSorted = [...currentLabels].sort();
            const finalSorted = [...finalLabels].sort();
            if (JSON.stringify(currentSorted) !== JSON.stringify(finalSorted)) {
              const labelsToAdd = finalSorted.filter(label => !currentLabels.has(label));
              const labelsToRemove = currentSorted.filter(label => !finalLabels.has(label));

              if (labelsToAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: labelsToAdd
                });
              }

              for (const label of labelsToRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: label
                  });
                } catch (error) {
                  const status = error?.status ?? error?.response?.status;
                  if (status === 404) {
                    core.warning(`Label already absent (404), skip removing: "${label}"`);
                    continue;
                  }
                  if (status !== 404) {
                    throw error;
                  }
                }
              }
            }
