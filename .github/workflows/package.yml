name: "Package"
on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'defaultconfigs/**'
      - 'mods/**'
      - 'pack.toml'
      - 'index.toml'
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for release"
        required: true
jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
    - uses: actions/checkout@v4
    - uses: nixbuild/nix-quick-install-action@v30
      with:
        nix_on_tmpfs: true
        nix_conf: |
          keep-env-derivations = true
          keep-outputs = true
    - name: Restore and save Nix store
      uses: nix-community/cache-nix-action@v6
      with:
        primary-key: gregtech-odyssey-${{ runner.os }}
        gc-max-store-size-linux: 2G
        purge: true
        purge-prefixes: gregtech-odyssey-${{ runner.os }}
        purge-created: 0
        purge-last-accessed: 0
        purge-primary-key: always
    - name: Build CurseForge export
      run: |
        nix build .#curseforge -o curseforge
        mkdir curseforge-upload
        find -L curseforge -maxdepth 1 -type f -name '*.zip' -exec cp '{}' curseforge-upload/ \;
        chmod u+w curseforge-upload/*.zip
    - name: Inject latest translation into CurseForge export
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PACK_VERSION="$(sed -n 's/^version = \"\([^\"]*\)\"$/\1/p' pack.toml)"
        PACK_CORE_VERSION="$(printf '%s' "$PACK_VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)"
        CURSEFORGE_ZIP="$(find curseforge-upload -maxdepth 1 -type f -name '*.zip' | head -n 1)"
        RELEASE_JSON="$(gh api repos/GregTech-Odyssey/GTO-Translations/releases/latest)"
        RELEASE_TAG="$(printf '%s' "$RELEASE_JSON" | jq -r '.tag_name')"
        ASSET_NAME="$(printf '%s' "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("^gto-lang-all-locales-.*\\.zip$")) | .name' | head -n 1)"
        ASSET_URL="$(printf '%s' "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("^gto-lang-all-locales-.*\\.zip$")) | .browser_download_url' | head -n 1)"
        RELEASE_CORE_VERSION="$(printf '%s %s' "$RELEASE_TAG" "$ASSET_NAME" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)"

        if [ -z "$CURSEFORGE_ZIP" ]; then
          echo "::warning::Could not find the built CurseForge export zip, skipping translation injection."
          exit 0
        fi

        if [ -z "$PACK_CORE_VERSION" ]; then
          echo "::warning::Could not extract a numeric GTO version from pack version '$PACK_VERSION', skipping translation injection."
          exit 0
        fi

        if [ -z "$ASSET_NAME" ] || [ -z "$ASSET_URL" ]; then
          echo "::warning::Latest translation release '$RELEASE_TAG' has no gto-lang-all-locales archive, skipping translation injection."
          exit 0
        fi

        if [ "$PACK_CORE_VERSION" != "$RELEASE_CORE_VERSION" ]; then
          echo "::warning::Translation version mismatch: pack '$PACK_VERSION' -> $PACK_CORE_VERSION, latest translation '$ASSET_NAME' -> ${RELEASE_CORE_VERSION:-unknown}. The translation archive will not be added to the CurseForge export."
          exit 0
        fi

        TMP_DIR="$(mktemp -d)"
        mkdir -p "$TMP_DIR/config/openloader/resources"
        curl -L \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/octet-stream" \
          -o "$TMP_DIR/config/openloader/resources/$ASSET_NAME" \
          "$ASSET_URL"
        (
          cd "$TMP_DIR" &&
          zip -q "$GITHUB_WORKSPACE/$CURSEFORGE_ZIP" "config/openloader/resources/$ASSET_NAME"
        )
        rm -rf "$TMP_DIR"
        echo "Injected $ASSET_NAME into $CURSEFORGE_ZIP."
    - name: Build Server Modpack
      run: |
        nix build .#modpack
        mkdir modpack
        cp -r result/* modpack/
        chmod -R +w modpack/config/ modpack/defaultconfigs/
        zip -r GregTech-Odyssey-server-mods.zip modpack/*
    - name: Build Client Modpack
      run: |
        nix build .#modpack-client
        mkdir modpack-client
        cp -r result/* modpack-client/
        chmod -R +w modpack-client/config/ modpack-client/defaultconfigs/
        zip -r GregTech-Odyssey-client-mods.zip modpack-client/*
    - name: Build Server
      run: |
        nix build .#server
        mkdir server
        cp -r result/* server/
        chmod -R +w server/config/ server/defaultconfigs/
        zip -r GregTech-Odyssey-server.zip server/*
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GregTech-Odyssey
        path: |
          ./curseforge-upload/**.zip
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GregTech-Odyssey-server-mods
        path: ./GregTech-Odyssey-server-mods.zip
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GregTech-Odyssey-client-mods
        path: ./GregTech-Odyssey-client-mods.zip
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GregTech-Odyssey-server
        path: ./GregTech-Odyssey-server.zip

  
  publish:
    needs: [package]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - if: github.event_name == 'workflow_dispatch'
        name: Generate tag name
        run: echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> $GITHUB_ENV
      - if: github.event_name == 'push'
        name: Generate tag name
        run: |
          echo "TAG_NAME=nightly" >> $GITHUB_ENV
      - if: env.TAG_NAME == 'nightly'
        name: Create tag
        run: | 
          echo "SUBJECT=Gregtech Odyssey Nightly Release $(echo $GITHUB_SHA | cut -c 1-7)" >> $GITHUB_ENV
          echo 'PRERELEASE=--prerelease' >> $GITHUB_ENV
          gh release delete nightly --yes || true
          git push origin :nightly || true
      - if: env.TAG_NAME != 'nightly'
        name: Create tag
        run: |
          (echo 'SUBJECT=Gregtech Odyssey Release';
           echo 'PRERELEASE=') >> $GITHUB_ENV
          git push origin :$TAG_NAME || true 
      - name: Publish release
        run: |
          gh release create $TAG_NAME $PRERELEASE --title "$SUBJECT" --target $GITHUB_SHA GregTech-Odyssey/* GregTech-Odyssey-server-mods/* GregTech-Odyssey-client-mods/* GregTech-Odyssey-server/* 
