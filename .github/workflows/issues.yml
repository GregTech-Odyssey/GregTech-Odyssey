name: Close Completed Issues

on:
  push:
    branches:
      - main
    paths:
      - 'pack.toml'

jobs:
  close-completed-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
    - name: Close completed issues
      uses: actions/github-script@v6
      with:
        script: |
          const params = {
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'Status: 已完成 completed'
          };

          // Use the Octokit pagination helper to fetch all pages
          const issues = await github.paginate(github.rest.issues.listForRepo, params);

          for (const issue of issues) {
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });
          }
