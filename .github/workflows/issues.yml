name: Close Completed Issues

on:
  push:
    branches:
      - main
    paths:
      - 'pack.toml'

jobs:
  close-completed-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
    - name: Close completed issues
      uses: actions/github-script@v6
      with:
        script: |
          const params = {
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'Status: 已完成 completed',
            per_page: 100
          };

          let closedCount = 0;

          for await (const { data: issues } of github.paginate.iterator(github.rest.issues.listForRepo, params)) {
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              closedCount++;
            }
          }

          console.log(`Closed ${closedCount} completed issue(s).`);
